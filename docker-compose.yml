version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: picky_news_feed_app
    restart: unless-stopped
    command: sh docker/php/docker-entrypoint.sh
    ports:
      - "8080:80"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      APP_CACHE_DIR: /tmp/picky_news_feed/cache
      APP_LOG_DIR: /tmp/picky_news_feed/log
    volumes:
      - .:/srv/picky_news_feed
      - ./var:/srv/picky_news_feed/var:rw
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: picky_news_feed_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: picky_news_feed
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: change_me_in_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
