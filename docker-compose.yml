services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: picky_rss_app
    restart: unless-stopped
    command: sh docker/php/docker-entrypoint.sh
    environment:
      APP_CACHE_DIR: /tmp/picky_rss/cache
      APP_LOG_DIR: /tmp/picky_rss/log
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      CRON_INTERVAL: ${CRON_INTERVAL:-900}
    volumes:
      - .:/srv/picky_rss
      - ./var:/srv/picky_rss/var:rw
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: picky_rss_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/srv/picky_rss
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: picky_rss_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: picky_rss
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: change_me_in_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:

